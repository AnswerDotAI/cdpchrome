name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: tools/build.sh all
      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            build/cdpchrome-macos.zip
            build/cdpchrome-linux-amd64.tar.gz
            build/cdpchrome-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release/cdpchrome-macos.zip
            artifacts/release/cdpchrome-linux-amd64.tar.gz
            artifacts/release/cdpchrome-windows.zip
          generate_release_notes: true
